<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Train Order Operator</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 2rem auto;
      max-width: 720px;
      line-height: 1.5;
      color: #222;
      padding: 0 1rem;
    }
    h1 { margin-bottom: 0.25rem; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      background: #fafafa;
    }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      text-decoration: none;
      color: #1155cc;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Train Order Operator</h1>
  <p>MVP launcher for dispatcher workflows from one entry point.</p>

  <div class="cards">
    <section class="card">
      <h2>Train Orders</h2>
      <p>Copy and print train orders.</p>
      <a href="/train-order/orders">Open Train Orders</a>
    </section>

    <section class="card">
      <h2>Clearance Cards</h2>
      <p>Write and print clearance cards.</p>
      <a href="/clearance-card/ui/clearance-cards">Open Clearance Cards</a>
    </section>
  </div>
</body>
</html>
