name: to-operator

services:
  portal:
    image: nginx:1.27-alpine
    container_name: to-operator-portal
    ports:
      - "${PORTAL_PORT:-8080}:80"
    volumes:
      - ./portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      trainorder:
        condition: service_healthy
      clearancecard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q '^ok$'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  trainorder:
    image: ${TRAIN_ORDER_IMAGE:-to-operator-trainorder}
    build:
      context: ${TRAIN_ORDER_PATH:-../TrainOrder}
    container_name: to-operator-trainorder
    environment:
      - SERVER_PORT=8080
      - SERVER_FORWARD_HEADERS_STRATEGY=framework
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\"' && wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  clearancecard:
    image: ${CLEARANCE_CARD_IMAGE:-to-operator-clearancecard}
    build:
      context: ${CLEARANCE_CARD_PATH:-../ClearanceCard}
      dockerfile: ${CLEARANCE_CARD_DOCKERFILE:-Dockerfile}
    container_name: to-operator-clearancecard
    environment:
      - SERVER_PORT=8080
      - SERVER_FORWARD_HEADERS_STRATEGY=framework
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q '\"status\"' && wget -q -O - http://127.0.0.1:8080/actuator/health | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

