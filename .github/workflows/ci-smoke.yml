name: CI Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRAIN_ORDER_IMAGE: ghcr.io/trainbeans/tooperator-trainorder:latest
      CLEARANCE_CARD_IMAGE: ghcr.io/trainbeans/tooperator-clearancecard:latest
      CI_SMOKE_SKIP_BUILD: "true"
      PORTAL_PORT: 8080
    steps:
      - name: Checkout TOOperator
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI smoke script
        run: |
          chmod +x scripts/ci-smoke.sh
          ./scripts/ci-smoke.sh "http://localhost:${PORTAL_PORT}"

