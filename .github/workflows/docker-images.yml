name: Build Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout TOOperator
        uses: actions/checkout@v4

      - name: Checkout TrainOrder
        uses: actions/checkout@v4
        with:
          repository: TrainBeans/TrainOrder
          path: external/TrainOrder

      - name: Checkout ClearanceCard
        uses: actions/checkout@v4
        with:
          repository: TrainBeans/ClearanceCard
          path: external/ClearanceCard

      - name: Compute image namespace
        id: vars
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: TrainOrder image metadata
        id: trainorder_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/tooperator-trainorder
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push TrainOrder image
        uses: docker/build-push-action@v6
        with:
          context: external/TrainOrder
          file: external/TrainOrder/Dockerfile
          push: true
          tags: ${{ steps.trainorder_meta.outputs.tags }}
          labels: ${{ steps.trainorder_meta.outputs.labels }}

      - name: ClearanceCard image metadata
        id: clearancecard_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/tooperator-clearancecard
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push ClearanceCard image
        uses: docker/build-push-action@v6
        with:
          context: external/ClearanceCard
          file: external/ClearanceCard/Dockerfile
          push: true
          tags: ${{ steps.clearancecard_meta.outputs.tags }}
          labels: ${{ steps.clearancecard_meta.outputs.labels }}

